<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bubbi 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #ffe6f0;
  font-family: "Comic Sans MS", cursive;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.container {
  padding: 20px;
}

h1 {
  color: #ff4d88;
  font-size: 2.4rem;
}

.character {
  font-size: 5rem;
  animation: bounce 1.2s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.message {
  color: #d6336c;
  font-size: 1.2rem;
  margin: 15px auto;
  max-width: 420px;
  line-height: 1.6;
}

.buttons {
  margin-top: 30px;
  position: relative;
  height: 120px;
}

button {
  padding: 14px 26px;
  font-size: 18px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  position: absolute;
}

#yesBtn {
  background: #ff4d88;
  color: white;
  left: 25%;
}

#noBtn {
  background: white;
  color: #ff4d88;
  left: 55%;
}

button:hover {
  transform: scale(1.1);
}

#result {
  margin-top: 25px;
  font-size: 1.4rem;
  color: #ff2f75;
  font-weight: bold;
}

.heart {
  position: absolute;
  font-size: 24px;
  animation: float 4s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="character">🥺💖</div>

  <h1>Bubbi, will you be my Valentine?</h1>

  <div class="message">
    From your Buggi 🐻<br><br>
    I am really really sorry Bubbi 😔<br>
    You mean a lot to me… more than I say.<br>
    Please forgive me and give me one chance 💕
  </div>

  <div class="buttons">
    <button id="yesBtn" onclick="yesClicked()">Yes 💖</button>
    <button id="noBtn" onmouseover="moveNo()">No 😭</button>
  </div>

  <div id="result"></div>
</div>

<script>
function yesClicked() {
  document.getElementById("result").innerHTML =
    "Knew you would say yes! Hehe 😆 Try clicking NO once Bubbi 💕";
}

function moveNo() {
  const btn = document.getElementById("noBtn");

  const x = Math.random() * 300 - 150;
  const y = Math.random() * 150 - 75;

  btn.style.transform = `translate(${x}px, ${y}px)`;
}

// optional hearts if she keeps trying 😄
document.getElementById("yesBtn").addEventListener("click", () => {
  createHearts();
});

function createHearts() {
  for (let i = 0; i < 15; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = 2 + Math.random() * 3 + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }
}
</script>

</body>
</html>
